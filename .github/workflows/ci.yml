name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: PHP ${{ matrix.php }} / Moodle ${{ matrix.moodle-branch }} / ${{ matrix.database }}
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_USER: 'root'
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
          MYSQL_CHARACTER_SET_SERVER: "utf8mb4"
          MYSQL_COLLATION_SERVER: "utf8mb4_unicode_ci"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            moodle-branch: 'MOODLE_403_STABLE'
            database: 'pgsql'
          - php: '8.2'
            moodle-branch: 'MOODLE_404_STABLE'
            database: 'pgsql'
          - php: '8.3'
            moodle-branch: 'MOODLE_405_STABLE'
            database: 'mariadb'

    steps:
      - name: Check out plugin code
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pgsql, mysqli, zip, gd, xmlrpc, soap, intl
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8

      - name: Install Moodle
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: PHP Copy/Paste Detector
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpcpd

      - name: PHP Mess Detector
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        id: codechecker
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          set -o pipefail
          moodle-plugin-ci codechecker -vvv --max-warnings 0 2>&1 | tee /tmp/codechecker.log

      - name: Dump codechecker log to summary
        if: ${{ always() }}
        run: |
          {
            echo '## codechecker output'
            echo '```'
            tail -c 60000 /tmp/codechecker.log 2>/dev/null || echo '(no log)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpdoc

      - name: Validating
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache

      - name: Grunt
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: PHPUnit tests
        id: phpunit
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          set -o pipefail
          moodle-plugin-ci phpunit -vvv --verbose --fail-on-warning 2>&1 | tee /tmp/phpunit.log

      - name: Dump phpunit log to summary
        if: ${{ always() }}
        run: |
          {
            echo '## phpunit output'
            echo '```'
            tail -c 60000 /tmp/phpunit.log 2>/dev/null || echo '(no log)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post diagnostic output as PR comment
        if: ${{ always() && github.event_name == 'pull_request' && (steps.codechecker.outcome == 'failure' || steps.phpunit.outcome == 'failure') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "### Diagnostic from PHP ${{ matrix.php }} / Moodle ${{ matrix.moodle-branch }} / ${{ matrix.database }}"
            if [ "${{ steps.codechecker.outcome }}" = "failure" ]; then
              echo '<details><summary>codechecker log (last 30 KB)</summary>'
              echo
              echo '```'
              tail -c 30000 /tmp/codechecker.log 2>/dev/null || echo '(no log)'
              echo '```'
              echo '</details>'
            fi
            if [ "${{ steps.phpunit.outcome }}" = "failure" ]; then
              echo '<details><summary>phpunit log (last 30 KB)</summary>'
              echo
              echo '```'
              tail -c 30000 /tmp/phpunit.log 2>/dev/null || echo '(no log)'
              echo '```'
              echo '</details>'
            fi
          } > /tmp/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body-file /tmp/comment.md

      - name: Propagate codechecker / phpunit exit status
        if: ${{ always() }}
        run: |
          if [ "${{ steps.codechecker.outcome }}" = "failure" ] || [ "${{ steps.phpunit.outcome }}" = "failure" ]; then
            exit 1
          fi
